name: CI/CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许创建 Release 并上传附件
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 建议使用更新的 v4 版本
        with:
          fetch-depth: 0 # 获取完整历史以避免某些 git 错误
      
      - name: Build Docker image
        run: docker build -t latex-env:latest .
      
      - name: Run LaTeX compilation
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/var/local/workspace \
            -w /var/local/workspace \
            latex-env:latest \
            make run
      
      - name: List generated PDFs
        run: ls -la *.pdf
      
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # 使用构建号作为标签，例如 v1, v2，永远不会重复
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            Auto-generated PDF from commit ${{ github.sha }}
            Build number: ${{ github.run_number }}
          draft: false
          prerelease: false
      
      - name: Upload Assets to Release
        uses: csexton/release-asset-action@v2
        with:
          pattern: "*.pdf"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          release-url: ${{ steps.create_release.outputs.upload_url }}
